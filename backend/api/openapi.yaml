openapi: 3.0.3
info:
  title: LedgerFlow API
  version: 0.1.0
  description: >
    Personal-finance API. Phase 1 foundation. This contract is the single source of
    truth (Architecture Guidelines §4.6); update it before changing an endpoint.
    Implemented: /health, POST /api/auth/register. The remaining auth endpoints are
    specified here but return 501 until implemented (the learning-half work).

servers:
  - url: http://localhost:8080

paths:
  /health:
    get:
      summary: Liveness + database connectivity
      operationId: getHealth
      responses:
        "200":
          description: Service and database are up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: Database is unreachable.

  /api/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request shape.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      summary: Log in and receive an HttpOnly session cookie
      operationId: loginUser
      description: "Not implemented yet (returns 501)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in; Set-Cookie: session=...
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      summary: Revoke the current session
      operationId: logoutUser
      description: "Not implemented yet (returns 501)."
      responses:
        "204":
          description: Logged out; session cookie cleared.

  /api/auth/me:
    get:
      summary: Get the currently authenticated user
      operationId: getCurrentUser
      description: "Not implemented yet (returns 501). Requires a valid session cookie."
      responses:
        "200":
          description: The authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          example: ok
        db:
          type: string
          example: up
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
